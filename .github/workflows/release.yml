name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
      issues: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Preflight checks
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/repo-governance/preflight.sh "$GITHUB_REF_NAME"

  release:
    name: Release
    needs: preflight
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write      # create/edit the release + upload assets
      id-token: write       # OIDC token for keyless attestation (Fulcio/Rekor)
      attestations: write   # write the provenance attestation
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.4"

      - name: Install minisign
        run: |
          sudo apt-get update
          sudo apt-get install -y minisign

      - name: Write minisign secret key to a temp file
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          key_file="$(mktemp)"
          printf '%s' "$MINISIGN_SECRET_KEY" > "$key_file"
          chmod 600 "$key_file"
          echo "MINISIGN_SECRET_KEY_FILE=$key_file" >> "$GITHUB_ENV"

      - name: Install syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.46.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "~> v2.15"
          # --skip=homebrew: the rtxnik/homebrew-tap repo and HOMEBREW_TAP_GITHUB_TOKEN
          # are not provisioned yet, so publishing the formula would fail the release.
          # The brews: block in .goreleaser.yml stays configured and is still exercised
          # by the ci.yml snapshot gate (generate-only). To enable the Homebrew channel,
          # create the tap + token secret and drop this flag.
          args: release --clean --skip=homebrew
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          # Subjects are every file listed in checksums.txt (name + digest), so
          # one attestation covers all archives and packages.
          subject-checksums: dist/checksums.txt

      - name: Publish the draft release
        # Runs only if the attestation step above succeeded (steps are sequential;
        # a failed attest leaves the release as an unpublished draft — no public garbage).
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false --repo rtxnik/lazyray
