name: PR gates

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, labeled, unlabeled]

permissions:
  contents: read

jobs:
  pr-title:
    name: PR title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Validate title against Conventional Commits
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            ci
            build
            refactor
            perf
            test
            revert

  changelog:
    name: Changelog OK
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Require a CHANGELOG touch or the no-changelog label
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          labels=$(gh api "repos/$REPO/pulls/$PR" --jq '.labels[].name')
          if grep -qxF 'no-changelog' <<<"$labels"; then
            echo "no-changelog label present - exempt"
            exit 0
          fi
          files=$(gh api "repos/$REPO/pulls/$PR/files" --paginate --jq '.[].filename')
          if grep -qxF 'CHANGELOG.md' <<<"$files"; then
            echo "CHANGELOG.md updated"
            exit 0
          fi
          echo "::error::User-visible PRs must update the [Unreleased] section of CHANGELOG.md. If this change is not user-visible, apply the 'no-changelog' label."
          exit 1
